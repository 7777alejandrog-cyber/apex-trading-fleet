name: Passive Income Agents

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:

  arbitrage-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run arbitrage scan
        run: |
          python - <<'PYEOF'
          import requests, re
          from datetime import datetime
          TARGETS=[
            ("Nike Air Jordan 1",180,40),
            ("AirPods Pro",180,30),
            ("Nintendo Switch",280,40),
            ("PlayStation 5",480,60),
            ("MacBook Air M1",750,80),
            ("DeWalt drill",180,30),
          ]
          print(f"ARBITRAGE SCAN {datetime.now().strftime('%m/%d %H:%M')}")
          print("="*40)
          for item,market_val,min_profit in TARGETS:
            try:
              r=requests.get(f"https://www.ebay.com/sch/i.html?_nkw={item.replace(' ','+')}&LH_Sold=1&_sop=12",headers={"User-Agent":"Mozilla/5.0"},timeout=10)
              prices=[float(p.replace(",","")) for p in re.findall(r'\$([0-9,]+\.?[0-9]*)',r.text) if 5<float(p.replace(",",""))<market_val*1.3]
              if prices:
                buy=sum(prices[:8])/len(prices[:8])*0.65
                profit=market_val-buy
                if profit>=min_profit:
                  print(f"FLIP: {item} | Buy ~${buy:.0f} | Sell ~${market_val} | Profit ~${profit:.0f}")
            except Exception as e:
              print(f"{item}: {e}")
          print("="*40)
          PYEOF

  freelance-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run freelance scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os, requests, re
          from datetime import datetime
          API_KEY = os.environ.get("ANTHROPIC_API_KEY","")
          MY_SKILLS = ["Python","automation","trading","web scraping","AI","data analysis","customer service"]
          def call_claude(prompt):
            if not API_KEY: return "No API key"
            r=requests.post("https://api.anthropic.com/v1/messages",
              headers={"x-api-key":API_KEY,"anthropic-version":"2023-06-01","content-type":"application/json"},
              json={"model":"claude-sonnet-4-20250514","max_tokens":400,"messages":[{"role":"user","content":prompt}]},
              timeout=30)
            return r.json()["content"][0]["text"]
          def fetch_jobs():
            jobs=[]
            try:
              r=requests.get("https://remoteok.com/api",headers={"User-Agent":"Mozilla/5.0"},timeout=10)
              for item in r.json()[1:15]:
                if isinstance(item,dict):
                  jobs.append({"title":item.get("position",""),"desc":item.get("description","")[:300],"url":item.get("url","")})
            except: pass
            return jobs
          jobs=fetch_jobs()
          scored=sorted([{**j,"score":sum(12 for s in MY_SKILLS if s.lower() in (j["title"]+" "+j["desc"]).lower())} for j in jobs],key=lambda x:x["score"],reverse=True)
          scored=[j for j in scored if j["score"]>=24]
          print(f"Found {len(scored)} matching jobs")
          os.makedirs("proposals",exist_ok=True)
          for job in scored[:3]:
            proposal=call_claude(f"Write 80-word freelance proposal for: {job['title']}. Details: {job['desc'][:150]}. Skills: Python automation AI. Be direct.")
            fname=f"proposals/{datetime.now().strftime('%Y%m%d_%H%M')}_{re.sub(r'[^a-z0-9]','_',job['title'].lower()[:25])}.txt"
            open(fname,"w").write(f"JOB: {job['title']}\nURL: {job['url']}\nSCORE: {job['score']}/100\n\n{proposal}")
            print(f"\n--- {job['title']} (score:{job['score']}) ---")
            print(proposal[:200])
          PYEOF
      - name: Upload proposals
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proposals-${{ github.run_number }}
          path: proposals/
          retention-days: 7
