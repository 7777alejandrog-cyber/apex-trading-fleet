name: Income Ecosystem

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:

  ugc-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run UGC creator system
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_c_ugc.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ugc-kit-${{ github.run_number }}
          path: ugc/
          retention-days: 14

  content-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run content factory and affiliate engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_d_content.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: content-${{ github.run_number }}
          path: content/
          retention-days: 14

  twitter-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run Twitter content engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_e_twitter.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twitter-${{ github.run_number }}
          path: twitter/
          retention-days: 14

  ebook-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Generate digital product
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_f_ebook.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ebook-${{ github.run_number }}
          path: ebook/
          retention-days: 30

  trend-scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Scout trending topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_g_trends.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trends-${{ github.run_number }}
          path: trends/
          retention-days: 3
